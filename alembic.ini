# ============================================================
# alembic.ini
# Configuração das migrations de banco de dados
# ============================================================

[alembic]
# Caminho para os scripts de migração
script_location = migrations

# Formato do nome dos arquivos de migração
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# URL do banco (sobrescrita pelo env_url em migrations/env.py)
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/signal_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
